<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departure | Enchanting Uttarakhand</title>
    <link rel="stylesheet" href="departure.css">
</head>
<body>
    <div class="bigbox">
        <div class="bigbox1">
            
            <!-- Navigation Bar -->
            <div class="navbar">
                <div class="navbar-box">
                    <p>Home</p>
                    <p>Location</p>
                    <p>Register</p>
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn">
                <button class="btnin">Explore Now</button>
                <button class="btnin">Book Journey</button>
            </div>

            <!-- Main Content -->
            <div class="content">
                
                <!-- Left Side: Form -->
                <div class="con-form">
                    <div class="form-txt">
                        <p class="from-txt1">Plan Your</p>
                        <p class="dep-txt2">Departure</p>
                    </div>

                    <div class="placeholder">
                        <input class="placeholderin" type="text" placeholder="From (City)">
                        <input class="placeholderin" type="text" placeholder="To (Destination)">
                    </div>

                    <div class="placeholder">
                        <input class="placeholderin" type="date">
                        <input class="placeholderin" type="date">
                    </div>

                    <div class="placeholder">
                        <button class="search-btn">Search Flights</button>
                    </div>
                </div>

                <!-- Right Side: Heading -->
                <div class="con-hed">
                    <p>All</p>
                    <p class="con-hed-middle">the</p>
                    <p>Best</p>
                </div>
            </div>
