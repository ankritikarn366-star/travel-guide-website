<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="contact-container">
        <div class="contact-box">
            <!-- Left Side: Info Section -->
            <div class="contact-info">
                <h1>Contact <span>Us</span></h1>
                <p>We’d love to hear from you! Whether you have a question, feedback, or just want to say hello — reach out to us anytime.</p>

                <div class="contact-details">
                    <p><strong>📍 Address:</strong> Tula’s Institute, Dehradun, India</p>
                    <p><strong>📧 Email:</strong> travelguide@gmail.com</p>
                    <p><strong>📞 Phone No:</strong> +91 98765 43210</p>
                </div>

                <div class="social-links">
                    <a href="#">🌐</a>
                    <a href="#">📸</a>
                    <a href="#">🐦</a>
                    <a href="#">💼</a>
                </div>
            </div>

            <!-- Right Side: Contact Form -->
            <div class="contact-form">
                <h2>Send a Message</h2>
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
